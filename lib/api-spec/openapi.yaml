          type: integer
        referralCode:
          type: string
        payoutMethod:
          type: string
        payoutEmail:
          type: ["string", "null"]
        taxFormSubmitted:
          type: boolean
        isActive:
          type: boolean
      required: [id, userId, referralCode, isActive]

    UpdateAffiliateProfile:
      type: object
      properties:
        payoutMethod:
          type: string
        payoutEmail:
          type: string
        isActive:
          type: boolean

    TaxFormSubmission:
      type: object
