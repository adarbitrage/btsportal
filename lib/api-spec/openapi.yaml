          type: string
        email:
          type: string
        pendingEmail:
          type: ["string", "null"]
          description: Address awaiting click-to-confirm verification, if any.
        lastAdminCancelledEmailChange:
          oneOf:
            - $ref: "#/components/schemas/AdminCancelledEmailChange"
            - type: "null"
          description: |
            Set when the member's most recent email-change attempt was cancelled
            by an admin and there's no newer attempt since. The portal uses this
            to surface a one-line note on the security/account page so members
            understand why a pending change vanished. `null` when there is no
            recent admin cancellation to surface (e.g. the member completed,
            cancelled themselves, or has a newer attempt in flight).
        phone:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        sourceProduct:
          type: ["string", "null"]
        role:
          type: string
        onboardingComplete:
          type: boolean
        onboardingStep:
          type: integer
        onboardingVariant:
          type: string
          enum: [none, launchpad, full]
        experienceLevel:
          type: ["string", "null"]
        primaryGoal:
          type: ["string", "null"]
        smsOptIn:
          type: boolean
        ticketReplySmsOptIn:
          type: boolean
          description: |
            Per-category SMS preference for support ticket-reply texts.
            When false, the member receives no SMS when support replies to
            a ticket, even if the master smsOptIn is on. Other SMS categories
            (account/security, billing, reminders) are unaffected. Email
            ticket-reply notifications always send regardless of this flag.
        securitySmsOptIn:
          type: boolean
          description: |
            Per-category SMS preference for account & security texts (e.g.
            password resets, login credentials). Gated under the master
            smsOptIn. Defaults on. Email always sends regardless.
        billingSmsOptIn:
          type: boolean
          description: |
            Per-category SMS preference for billing texts (e.g. purchase
            confirmations, failed-payment notices). Gated under the master
            smsOptIn. Defaults on. Email always sends regardless.
        coachingSmsOptIn:
          type: boolean
          description: |
            Per-category SMS preference for coaching-call reminder texts.
            Gated under the master smsOptIn. Defaults on. Email always sends
            regardless.
        contentSmsOptIn:
          type: boolean
          description: |
            Per-category SMS preference for new-content alert texts. Gated
            under the master smsOptIn. Defaults off (marketing-ish). Email
            always sends regardless.
        partnerCallSmsOptIn:
          type: boolean
          description: |
            Per-category SMS preference for kickoff-call AND accountability
            partner-call reminder texts (one category covers both). Gated
            under the master smsOptIn. Defaults on. Email always sends
            regardless.
        marketingOptIn:
          type: boolean
        currentStreak:
          type: integer
        memberSince:
          type: string
        highestProductName:
          type: string
        highestProductSlug:
          type: string
        entitlements:
