openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: BTS Member Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: members
  - name: onboarding
  - name: documents
  - name: products
  - name: tracks
  - name: modules
  - name: lessons
  - name: blitz
  - name: progress
  - name: coaching
  - name: coaches
  - name: tickets
  - name: coaching-private
  - name: admin-coaching
  - name: admin-tickets
  - name: announcements
  - name: community
  - name: community-categories
  - name: community-posts
  - name: community-comments
  - name: community-reactions
  - name: community-members
  - name: community-notifications
  - name: chat
  - name: admin-chat
  - name: admin-communications
  - name: apps
  - name: admin-tools
  - name: coach-dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /members/me:
    get:
      operationId: getCurrentMember
      tags: [members]
      summary: Get current member profile with entitlements
      responses:
        "200":
          description: Member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfile"

  /members/me/products:
    get:
      operationId: getMemberProducts
      tags: [members]
      summary: List all products owned by current member
      responses:
        "200":
          description: List of owned products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OwnedProduct"

  /members/me/entitlements:
    get:
      operationId: getMemberEntitlements
      tags: [members]
      summary: Get resolved entitlement set
      responses:
        "200":
          description: Entitlement set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitlementSet"

  /members/me/onboarding:
    get:
      operationId: getOnboardingState
      tags: [onboarding]
      summary: Get current onboarding state
      responses:
        "200":
          description: Onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"
    patch:
      operationId: patchOnboardingStep
      tags: [onboarding]
      summary: Complete current onboarding step and advance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOnboardingStepBody"
      responses:
        "200":
          description: Updated onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchOnboardingStepResponse"

  /members/me/onboarding/send-off:
    get:
      operationId: getOnboardingSendOff
      tags: [onboarding]
      summary: Get send-off page data (video + booked-call summary)
      responses:
        "200":
          description: Send-off page data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSendOff"

  /members/me/profile:
    patch:
      operationId: patchMemberProfile
      tags: [members]
      summary: Update member profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMemberProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchMemberProfileResponse"

  /members/me/password:
    post:
      operationId: changeMemberPassword
      tags: [members]
      summary: Change the current member's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeMemberPasswordBody"
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeMemberPasswordResponse"

  /members/me/email:
    post:
      operationId: requestMemberEmailChange
      tags: [members]
      summary: Request a verified change to the current member's email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestEmailChangeBody"
      responses:
        "200":
          description: Verification email sent to the new address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestEmailChangeResponse"
        "429":
          description: Per-user email-change rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /members/me/email/cancel:
    post:
      operationId: cancelMemberEmailChange
      tags: [members]
      summary: Cancel a pending email-change request
      responses:
        "200":
          description: Pending email change cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelEmailChangeResponse"

  /members/me/email/admin-cancellation/dismiss:
    post:
      operationId: dismissAdminCancelledEmailChange
      tags: [members]
      summary: Dismiss the admin-cancelled email-change banner
      description: |
        Marks the member's most recent admin-cancelled email-change attempt
        as dismissed so the in-app banner on the account/settings page does
        not reappear on every page load. Idempotent — safe to call when
        there is nothing to dismiss; the response just reports `dismissed:
        false` in that case.
      responses:
        "200":
          description: Dismissal recorded (or no-op if there was nothing to dismiss)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DismissAdminCancelledEmailChangeResponse"

  /members/me/email/prefill:
    get:
      operationId: getMemberEmailChangePrefill
      tags: [members]
      summary: Resolve a signed email-change prefill token into the address it carries
      description: |
        Verifies the signed `email_change_prefill` token issued in the
        admin-cancellation notice and returns the address the member had
        previously requested. The token is rejected unless it was signed
        for the currently-authenticated member, so the URL can't be
        reused to pre-seed someone else's email-change form.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Token verified — pre-fill payload returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailChangePrefillResponse"
        "400":
          description: Token missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Token does not belong to the current member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /members/me/checkout:
    post:
      operationId: startMemberCheckout
      tags: [members]
      summary: Start a hosted-checkout flow for an upgrade tier
      description: |
        Resolves the configured checkout URL for the requested plan, prefills
        it with the member's email and name, and returns it for the portal to
        redirect to. Refuses to start checkout for the member's current plan
        or any lower tier (HTTP 409). The cart provider's existing webhook
        (`/webhooks/thrivecart`) updates entitlements once the order
        completes — the portal does not grant access from this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartMemberCheckoutBody"
      responses:
        "200":
          description: Checkout URL resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMemberCheckoutResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Plan is not an upgrade for this member, or has no checkout configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents:
    get:
      operationId: getLegalDocuments
      tags: [documents]
      summary: Fetch legal documents
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of legal documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegalDocument"

  /documents/sign:
    post:
      operationId: signDocument
      tags: [documents]
      summary: Sign a legal document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignDocumentBody"
      responses:
        "200":
          description: Signed document confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignDocumentResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all available products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductInfo"

  /plans:
    get:
      operationId: listPlans
      tags: [products]
      summary: List upgradeable membership plans for the public /plans page
      description: |
        Returns the upgradeable membership plans rendered on the public
        /plans page. Plan name, priceDisplay, durationDays, entitlements,
        tagline, highlights, durationLabel, and the "recommended" ("Most
        popular") flag all come from the `products` table — admins edit
        them via PATCH /admin/products/{id} and the changes propagate to
        /plans automatically. Only the upgrade `rank` (slug ordering) is
        still server-side: the list of slugs that count as upgradeable
        plans and their order lives in
        `artifacts/api-server/src/lib/plans.ts`.
      responses:
        "200":
          description: Ordered list of upgradeable plans (lowest to highest tier)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /admin/products/{id}:
    patch:
      operationId: adminUpdateProductMetadata
      tags: [products]
      security:
        - cookieAuth: []
      summary: Edit a product's plan presentation metadata
      description: |
        Update the marketing-copy fields of a product row that are surfaced
        on the public /plans page: `tagline`, `highlights`, `durationLabel`,
        and the `recommended` ("Most popular") badge. Only fields included
        in the request body are touched; any field omitted is left as-is.
        Blank/whitespace-only `tagline` or `durationLabel` strings are
        stored as null. Blank entries in `highlights` are dropped.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductMetadataBody"
      responses:
        "200":
          description: Updated product row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductInfo"
        "400":
          description: Validation failed or no editable fields supplied
        "404":
          description: Product not found

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /tracks:
    get:
      operationId: listTracks
      tags: [tracks]
      summary: List all training tracks with modules
      responses:
        "200":
          description: List of tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackWithModules"

  /modules/{id}:
    get:
      operationId: getModule
      tags: [modules]
      summary: Get a module with its lessons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Module with lessons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleWithLessons"
        "404":
          description: Not found

  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a single lesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
        "404":
          description: Not found

  /blitz/events:
    post:
      operationId: postBlitzEvent
      tags: [blitz]
      summary: Record a Blitz view, completed, or uncompleted event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlitzEventInput"
      responses:
        "201":
          description: Event recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  event:
                    $ref: "#/components/schemas/BlitzEventRecord"
                required: [event]
        "400":
          description: Invalid input

  /blitz/continue:
    get:
      operationId: getBlitzContinue
      tags: [blitz]
      summary: Return the section the user should resume next
      responses:
        "200":
          description: Continue target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlitzContinue"

  /blitz/streak:
    get:
      operationId: getBlitzStreak
      tags: [blitz]
      summary: Return streak data and 84-day activity heatmap
      responses:
        "200":
          description: Streak data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlitzStreak"

  /blitz/phase-status:
    get:
      operationId: getBlitzPhaseStatus
      tags: [blitz]
      summary: Return per-phase completion and locked/unlocked state
      responses:
        "200":
          description: Phase status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlitzPhaseStatus"

  /progress:
    get:
      operationId: listProgress
      tags: [progress]
      summary: List all progress entries for the current user
      responses:
        "200":
          description: Progress entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Progress"
    post:
      operationId: markLessonComplete
      tags: [progress]
      summary: Mark a lesson as complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgress"
      responses:
        "201":
          description: Progress created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /coaching-calls:
    get:
      operationId: listCoachingCalls
      tags: [coaching]
      summary: List coaching calls
      parameters:
        - name: upcoming
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of coaching calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachingCall"

  /coaching-calls/{id}/attendance:
    post:
      operationId: registerForCoachingCall
      tags: [coaching]
      summary: Register the current member for a coaching call
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registration recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachingCallRegistration"
        "404":
          description: Coaching call not found or not accessible
    delete:
      operationId: cancelCoachingCallRegistration
      tags: [coaching]
      summary: Cancel the current member's registration for a coaching call
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registration cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachingCallRegistration"
        "404":
          description: Coaching call not found or not accessible

  /coaches:
    get:
      operationId: listCoaches
      tags: [coaches]
      summary: List all coaches
      responses:
        "200":
          description: List of coaches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coach"

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List support tickets for the current user
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, in_progress, awaiting_response, resolved, closed]
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a new support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicket"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "429":
          description: Per-tier monthly support ticket limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get a ticket with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketWithMessages"
        "404":
          description: Not found

  /tickets/{id}/messages:
    post:
      operationId: addTicketMessage
      tags: [tickets]
      summary: Add a message to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketMessage"
      responses:
        "201":
          description: Message added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketMessage"

  /tickets/{id}/satisfaction:
    post:
      operationId: submitTicketSatisfaction
      tags: [tickets]
      summary: Submit satisfaction survey for a resolved ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSatisfaction"
      responses:
        "201":
          description: Satisfaction survey submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSatisfaction"
        "400":
          description: Bad request
        "409":
          description: Survey already submitted
    get:
      operationId: getTicketSatisfaction
      tags: [tickets]
      summary: Get satisfaction survey status for a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Satisfaction status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SatisfactionStatus"

  /admin/tickets:
    get:
      operationId: adminListTickets
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: List all tickets (admin)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: assignedTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of all tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTicket"

  /admin/tickets/{id}:
    get:
      operationId: adminGetTicket
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Get ticket with all messages including internal notes (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with all messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketWithMessages"

  /admin/tickets/{id}/status:
    put:
      operationId: adminUpdateTicketStatus
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Update ticket status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, in_progress, awaiting_response, resolved, closed]
              required: [status]
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicket"

  /admin/tickets/{id}/reply:
    post:
      operationId: adminReplyToTicket
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Send a reply to a ticket (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketMessage"
      responses:
        "201":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketMessage"

  /admin/tickets/{id}/internal-note:
    post:
      operationId: adminAddInternalNote
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Add an internal note to a ticket (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketMessage"
      responses:
        "201":
          description: Internal note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketMessage"

  /admin/tickets/{id}/sla:
    get:
      operationId: adminGetTicketSla
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Get SLA details for a ticket (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SLA details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSlaDetail"

  /admin/tickets/merge:
    post:
      operationId: adminMergeTickets
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Merge duplicate tickets into a primary ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeTicketsBody"
      responses:
        "200":
          description: Merge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeTicketsResult"

  /admin/tickets/sla-dashboard:
    get:
      operationId: adminGetSlaDashboard
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Get SLA compliance dashboard (admin)
      responses:
        "200":
          description: SLA dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlaDashboard"

  /admin/tickets/analytics:
    get:
      operationId: adminGetTicketAnalytics
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Get ticket analytics (admin)
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketAnalytics"

  /admin/tickets/agent-performance:
    get:
      operationId: adminGetAgentPerformance
      tags: [admin-tickets]
      security:
        - cookieAuth: []
      summary: Get agent performance metrics (admin)
      responses:
        "200":
          description: Agent performance data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentPerformance"

  /admin/canned-responses:
    get:
      operationId: adminListCannedResponses
      tags: [admin-tickets]
      security:
