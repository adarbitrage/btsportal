openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: BTS Member Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: members
  - name: onboarding
  - name: documents
  - name: products
  - name: tracks
  - name: modules
  - name: lessons
  - name: progress
  - name: coaching
  - name: coaches
  - name: tickets
  - name: announcements
  - name: community
  - name: community-categories
  - name: community-posts
  - name: community-comments
  - name: community-reactions
  - name: community-members
  - name: community-notifications
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /members/me:
    get:
      operationId: getCurrentMember
      tags: [members]
      summary: Get current member profile with entitlements
      responses:
        "200":
          description: Member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfile"

  /members/me/products:
    get:
      operationId: getMemberProducts
      tags: [members]
      summary: List all products owned by current member
      responses:
        "200":
          description: List of owned products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OwnedProduct"

  /members/me/entitlements:
    get:
      operationId: getMemberEntitlements
      tags: [members]
      summary: Get resolved entitlement set
      responses:
        "200":
          description: Entitlement set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitlementSet"

  /members/me/onboarding:
    get:
      operationId: getOnboardingState
      tags: [onboarding]
      summary: Get current onboarding state
      responses:
        "200":
          description: Onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"
    patch:
      operationId: patchOnboardingStep
      tags: [onboarding]
      summary: Complete current onboarding step and advance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOnboardingStepBody"
      responses:
        "200":
          description: Updated onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchOnboardingStepResponse"

  /members/me/profile:
    patch:
      operationId: patchMemberProfile
      tags: [members]
      summary: Update member profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMemberProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchMemberProfileResponse"

  /documents:
    get:
      operationId: getLegalDocuments
      tags: [documents]
      summary: Fetch legal documents
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of legal documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegalDocument"

  /documents/sign:
    post:
      operationId: signDocument
      tags: [documents]
      summary: Sign a legal document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignDocumentBody"
      responses:
        "200":
          description: Signed document confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignDocumentResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all available products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductInfo"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /tracks:
    get:
      operationId: listTracks
      tags: [tracks]
      summary: List all training tracks with modules
      responses:
        "200":
          description: List of tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackWithModules"

  /modules/{id}:
    get:
      operationId: getModule
      tags: [modules]
      summary: Get a module with its lessons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Module with lessons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleWithLessons"
        "404":
          description: Not found

  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a single lesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
        "404":
          description: Not found

  /progress:
    get:
      operationId: listProgress
      tags: [progress]
      summary: List all progress entries for the current user
      responses:
        "200":
          description: Progress entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Progress"
    post:
      operationId: markLessonComplete
      tags: [progress]
      summary: Mark a lesson as complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgress"
      responses:
        "201":
          description: Progress created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /coaching-calls:
    get:
      operationId: listCoachingCalls
      tags: [coaching]
      summary: List coaching calls
      parameters:
        - name: upcoming
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of coaching calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachingCall"

  /coaches:
    get:
      operationId: listCoaches
      tags: [coaches]
      summary: List all coaches
      responses:
        "200":
          description: List of coaches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coach"

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List support tickets for the current user
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, in_progress, awaiting_response, resolved, closed]
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a new support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicket"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get a ticket with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketWithMessages"
        "404":
          description: Not found

  /tickets/{id}/messages:
    post:
      operationId: addTicketMessage
      tags: [tickets]
      summary: Add a message to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketMessage"
      responses:
        "201":
          description: Message added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketMessage"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /community/categories:
    get:
      operationId: listCommunityCategories
      tags: [community-categories]
      summary: List active community categories with post counts
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityCategory"

  /community/posts:
    get:
      operationId: listCommunityPosts
      tags: [community-posts]
      summary: Paginated community feed with category filter
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: categoryId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated post feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPostFeed"
    post:
      operationId: createCommunityPost
      tags: [community-posts]
      summary: Create a new community post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityPost"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPostRaw"

  /community/posts/{postId}:
    patch:
      operationId: editCommunityPost
      tags: [community-posts]
      summary: Edit a post within 15 minutes of creation
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditCommunityPost"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPostRaw"
    delete:
      operationId: deleteCommunityPost
      tags: [community-posts]
      summary: Soft delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /community/posts/{postId}/comments:
    get:
      operationId: listCommunityComments
      tags: [community-comments]
      summary: List comments for a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityCommentItem"
    post:
      operationId: createCommunityComment
      tags: [community-comments]
      summary: Create a comment on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityComment"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCommentRaw"

  /community/comments/{commentId}:
    patch:
      operationId: editCommunityComment
      tags: [community-comments]
      summary: Edit a comment within 5 minutes of creation
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditCommunityComment"
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCommentRaw"
    delete:
      operationId: deleteCommunityComment
      tags: [community-comments]
      summary: Soft delete a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /community/reactions:
    post:
      operationId: toggleCommunityReaction
      tags: [community-reactions]
      summary: Toggle fire reaction on a post or comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleCommunityReaction"
      responses:
        "200":
          description: Reaction toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReactionToggleResult"

  /community/members:
    get:
      operationId: listCommunityMembers
      tags: [community-members]
      summary: Paginated member directory
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: badge
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, activity, alpha]
      responses:
        "200":
          description: Paginated member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityMemberList"

  /community/members/{userId}:
    get:
      operationId: getCommunityMemberProfile
      tags: [community-members]
      summary: Get member profile with bio, badges, activity stats
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityMemberProfile"
        "404":
          description: Not found

  /community/notifications:
    get:
      operationId: listCommunityNotifications
      tags: [community-notifications]
      summary: List notifications with unread count
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityNotificationList"

  /community/notifications/{id}/read:
    patch:
      operationId: markCommunityNotificationRead
      tags: [community-notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /community/notifications/read-all:
    post:
      operationId: markAllCommunityNotificationsRead
      tags: [community-notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MemberProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        sourceProduct:
          type: ["string", "null"]
        onboardingComplete:
          type: boolean
        onboardingStep:
          type: integer
        experienceLevel:
          type: ["string", "null"]
        primaryGoal:
          type: ["string", "null"]
        smsOptIn:
          type: boolean
        currentStreak:
          type: integer
        memberSince:
          type: string
        highestProductName:
          type: string
        highestProductSlug:
          type: string
        entitlements:
          type: array
          items:
            type: string
        products:
          type: array
          items:
            $ref: "#/components/schemas/OwnedProduct"
        ticketLimit:
          type: integer
      required: [id, name, email, onboardingComplete, onboardingStep, smsOptIn, currentStreak, memberSince, highestProductName, highestProductSlug, entitlements, products, ticketLimit]

    OwnedProduct:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productSlug:
          type: string
        productName:
          type: string
        productType:
          type: string
        purchasedAt:
          type: string
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
      required: [id, productId, productSlug, productName, productType, purchasedAt, status]

    EntitlementSet:
      type: object
      properties:
        entitlements:
          type: array
          items:
            type: string
        highestProductName:
          type: string
        highestProductSlug:
          type: string
        ticketLimit:
          type: integer
      required: [entitlements, highestProductName, highestProductSlug, ticketLimit]

    ProductInfo:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        type:
          type: string
        priceDisplay:
          type: ["string", "null"]
        entitlementKeys:
          type: array
          items:
            type: string
        sortOrder:
          type: integer
      required: [id, slug, name, type, sortOrder]

    DashboardData:
      type: object
      properties:
        memberName:
          type: string
        highestProductName:
          type: string
        highestProductSlug:
          type: string
        memberSince:
          type: string
        daysSinceJoined:
          type: integer
        lessonsCompleted:
          type: integer
        totalLessons:
          type: integer
        hoursLearned:
          type: number
        currentStreak:
          type: integer
        openTickets:
          type: integer
        overallProgress:
          type: number
        entitlements:
          type: array
          items:
            type: string
        ownedProducts:
          type: array
          items:
            type: string
        nextLesson:
          $ref: "#/components/schemas/NextLesson"
        upcomingCalls:
          type: array
          items:
            $ref: "#/components/schemas/CoachingCall"
        recentAnnouncements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        ticketLimit:
          type: integer
      required:
        - memberName
        - highestProductName
        - highestProductSlug
        - memberSince
        - daysSinceJoined
        - lessonsCompleted
        - totalLessons
        - hoursLearned
        - currentStreak
        - openTickets
        - overallProgress
        - entitlements
        - ownedProducts
        - upcomingCalls
        - recentAnnouncements
        - ticketLimit

    NextLesson:
      type: object
      properties:
        lessonId:
          type: integer
        lessonTitle:
          type: string
        moduleName:
          type: string
        trackName:
          type: string
        durationMinutes:
          type: integer
      required: [lessonId, lessonTitle, moduleName, trackName, durationMinutes]

    TrackWithModules:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        requiredEntitlement:
          type: string
        isLocked:
          type: boolean
        sortOrder:
          type: integer
        totalModules:
          type: integer
        totalLessons:
          type: integer
        estimatedMinutes:
          type: integer
        progress:
          type: number
        isCurrent:
          type: boolean
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleSummary"
      required: [id, title, description, requiredEntitlement, isLocked, sortOrder, totalModules, totalLessons, estimatedMinutes, progress, isCurrent, modules]

    ModuleSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        sortOrder:
          type: integer
        totalLessons:
          type: integer
        completedLessons:
          type: integer
        progress:
          type: number
      required: [id, title, sortOrder, totalLessons, completedLessons, progress]

    ModuleWithLessons:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        trackId:
          type: integer
        sortOrder:
          type: integer
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/Lesson"
      required: [id, title, description, trackId, sortOrder, lessons]

    Lesson:
      type: object
      properties:
        id:
          type: integer
        moduleId:
          type: integer
        title:
          type: string
        description:
          type: string
        videoUrl:
          type: ["string", "null"]
        contentType:
          type: string
        durationMinutes:
          type: integer
        requiredEntitlement:
          type: string
        sortOrder:
          type: integer
        isCompleted:
          type: boolean
        isLocked:
          type: boolean
      required: [id, moduleId, title, description, contentType, durationMinutes, requiredEntitlement, sortOrder, isCompleted, isLocked]

    Progress:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        lessonId:
          type: integer
        completedAt:
          type: string
          format: date-time
      required: [id, userId, lessonId, completedAt]

    CreateProgress:
      type: object
      properties:
        lessonId:
          type: integer
      required: [lessonId]

    CoachingCall:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        callType:
          type: string
          enum: [weekly_qa, strategy, mastermind, vip_roundtable]
        coachId:
          type: integer
        coachName:
          type: string
        meetLink:
          type: ["string", "null"]
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        requiredEntitlement:
          type: string
        recordingUrl:
          type: ["string", "null"]
        registeredCount:
          type: integer
        isAccessible:
          type: boolean
      required: [id, title, description, callType, coachId, coachName, scheduledAt, durationMinutes, requiredEntitlement, registeredCount, isAccessible]

    Coach:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: string
        photoUrl:
          type: ["string", "null"]
        specialties:
          type: string
        callTypes:
          type: array
          items:
            type: string
      required: [id, name, bio, specialties, callTypes]

    Ticket:
      type: object
      properties:
        id:
          type: integer
        ticketNumber:
          type: string
        userId:
          type: integer
        category:
          type: string
          enum: [billing, technical, training, account, other]
        priority:
          type: string
          enum: [urgent, high, normal, low]
        status:
          type: string
          enum: [open, in_progress, awaiting_response, resolved, closed]
        subject:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, ticketNumber, userId, category, priority, status, subject, createdAt, updatedAt]

    CreateTicket:
      type: object
      properties:
        category:
          type: string
          enum: [billing, technical, training, account, other]
        subject:
          type: string
        description:
          type: string
      required: [category, subject, description]

    TicketWithMessages:
      type: object
      properties:
        id:
          type: integer
        ticketNumber:
          type: string
