      type: object
      description: |
        Snapshot of the most recent email-change attempt that an admin
        cancelled on the member's behalf. Surfaced on /members/me so the
        portal can explain why a previously pending change has disappeared.
      properties:
        attemptId:
          type: integer
          description: |
            email_change_attempts.id of the cancelled attempt. Passed back
            through when the member clicks "Contact support" from the banner
            so the resulting ticket can be linked to this exact attempt for
            the support team.
        newEmail:
          type: string
          description: The address the member tried to change to before the cancellation.
        cancelledAt:
          type: string
          format: date-time
          description: When the admin cancelled the pending change.
      required: [attemptId, newEmail, cancelledAt]

