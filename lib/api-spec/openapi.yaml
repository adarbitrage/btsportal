        Derived from the member's earliest active frontend product grant;
        falls back to the BTS platform defaults when no frontend product
        is held.
      properties:
        full:
          type: string
          description: Full brand name (e.g. "Build Test Scale" or "Your Second Engine").
        short:
          type: string
          description: Short brand name (e.g. "BTS" or "YSE").
        possessive:
          type: string
          description: Full possessive form (e.g. "Build Test Scale's").
        shortPossessive:
