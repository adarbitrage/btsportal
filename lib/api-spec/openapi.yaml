openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: BTS Member Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: members
  - name: onboarding
  - name: documents
  - name: products
  - name: tracks
  - name: modules
  - name: lessons
  - name: progress
  - name: coaching
  - name: coaches
  - name: tickets
  - name: admin-tickets
  - name: announcements
  - name: community
  - name: community-categories
  - name: community-posts
  - name: community-comments
  - name: community-reactions
  - name: community-members
  - name: community-notifications
  - name: chat
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /members/me:
    get:
      operationId: getCurrentMember
      tags: [members]
      summary: Get current member profile with entitlements
      responses:
        "200":
          description: Member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberProfile"

  /members/me/products:
    get:
      operationId: getMemberProducts
      tags: [members]
      summary: List all products owned by current member
      responses:
        "200":
          description: List of owned products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OwnedProduct"

  /members/me/entitlements:
    get:
      operationId: getMemberEntitlements
      tags: [members]
      summary: Get resolved entitlement set
      responses:
        "200":
          description: Entitlement set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitlementSet"

  /members/me/onboarding:
    get:
      operationId: getOnboardingState
      tags: [onboarding]
      summary: Get current onboarding state
      responses:
        "200":
          description: Onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"
    patch:
      operationId: patchOnboardingStep
      tags: [onboarding]
      summary: Complete current onboarding step and advance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOnboardingStepBody"
      responses:
        "200":
          description: Updated onboarding state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchOnboardingStepResponse"

  /members/me/profile:
    patch:
      operationId: patchMemberProfile
      tags: [members]
      summary: Update member profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMemberProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchMemberProfileResponse"

  /documents:
    get:
      operationId: getLegalDocuments
      tags: [documents]
      summary: Fetch legal documents
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of legal documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegalDocument"

  /documents/sign:
    post:
      operationId: signDocument
      tags: [documents]
      summary: Sign a legal document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignDocumentBody"
      responses:
        "200":
          description: Signed document confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignDocumentResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all available products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductInfo"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /tracks:
    get:
      operationId: listTracks
      tags: [tracks]
      summary: List all training tracks with modules
      responses:
        "200":
          description: List of tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackWithModules"

  /modules/{id}:
    get:
      operationId: getModule
      tags: [modules]
      summary: Get a module with its lessons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Module with lessons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleWithLessons"
        "404":
          description: Not found

  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get a single lesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
        "404":
          description: Not found

  /progress:
    get:
      operationId: listProgress
      tags: [progress]
      summary: List all progress entries for the current user
      responses:
        "200":
          description: Progress entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Progress"
    post:
      operationId: markLessonComplete
      tags: [progress]
      summary: Mark a lesson as complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgress"
      responses:
        "201":
          description: Progress created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /coaching-calls:
    get:
      operationId: listCoachingCalls
      tags: [coaching]
      summary: List coaching calls
      parameters:
        - name: upcoming
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of coaching calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachingCall"

  /coaches:
    get:
      operationId: listCoaches
      tags: [coaches]
      summary: List all coaches
      responses:
        "200":
          description: List of coaches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coach"

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List support tickets for the current user
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, in_progress, awaiting_response, resolved, closed]
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a new support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicket"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get a ticket with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketWithMessages"
        "404":
          description: Not found

  /tickets/{id}/messages:
    post:
      operationId: addTicketMessage
      tags: [tickets]
      summary: Add a message to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketMessage"
      responses:
        "201":
          description: Message added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketMessage"

  /tickets/{id}/satisfaction:
    post:
      operationId: submitTicketSatisfaction
      tags: [tickets]
      summary: Submit satisfaction survey for a resolved ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSatisfaction"
      responses:
        "201":
          description: Satisfaction survey submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSatisfaction"
        "400":
          description: Bad request
        "409":
          description: Survey already submitted
    get:
      operationId: getTicketSatisfaction
      tags: [tickets]
      summary: Get satisfaction survey status for a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Satisfaction status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SatisfactionStatus"

  /admin/tickets:
    get:
      operationId: adminListTickets
      tags: [admin-tickets]
      summary: List all tickets (admin)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: assignedTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of all tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTicket"

  /admin/tickets/{id}:
    get:
      operationId: adminGetTicket
      tags: [admin-tickets]
      summary: Get ticket with all messages including internal notes (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with all messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketWithMessages"

  /admin/tickets/{id}/status:
    put:
      operationId: adminUpdateTicketStatus
      tags: [admin-tickets]
      summary: Update ticket status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, in_progress, awaiting_response, resolved, closed]
              required: [status]
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicket"

  /admin/tickets/{id}/reply:
    post:
      operationId: adminReplyToTicket
      tags: [admin-tickets]
      summary: Send a reply to a ticket (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketMessage"
      responses:
        "201":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketMessage"

  /admin/tickets/{id}/internal-note:
    post:
      operationId: adminAddInternalNote
      tags: [admin-tickets]
      summary: Add an internal note to a ticket (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketMessage"
      responses:
        "201":
          description: Internal note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTicketMessage"

  /admin/tickets/{id}/sla:
    get:
      operationId: adminGetTicketSla
      tags: [admin-tickets]
      summary: Get SLA details for a ticket (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SLA details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSlaDetail"

  /admin/tickets/merge:
    post:
      operationId: adminMergeTickets
      tags: [admin-tickets]
      summary: Merge duplicate tickets into a primary ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergeTicketsBody"
      responses:
        "200":
          description: Merge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MergeTicketsResult"

  /admin/tickets/sla-dashboard:
    get:
      operationId: adminGetSlaDashboard
      tags: [admin-tickets]
      summary: Get SLA compliance dashboard (admin)
      responses:
        "200":
          description: SLA dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlaDashboard"

  /admin/tickets/analytics:
    get:
      operationId: adminGetTicketAnalytics
      tags: [admin-tickets]
      summary: Get ticket analytics (admin)
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketAnalytics"

  /admin/tickets/agent-performance:
    get:
      operationId: adminGetAgentPerformance
      tags: [admin-tickets]
      summary: Get agent performance metrics (admin)
      responses:
        "200":
          description: Agent performance data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentPerformance"

  /admin/canned-responses:
    get:
      operationId: adminListCannedResponses
      tags: [admin-tickets]
      summary: List canned responses with optional category filter
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of canned responses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CannedResponse"
    post:
      operationId: adminCreateCannedResponse
      tags: [admin-tickets]
      summary: Create a new canned response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCannedResponse"
      responses:
        "201":
          description: Canned response created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CannedResponse"

  /admin/canned-responses/{id}:
    put:
      operationId: adminUpdateCannedResponse
      tags: [admin-tickets]
      summary: Update a canned response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCannedResponse"
      responses:
        "200":
          description: Canned response updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CannedResponse"
    delete:
      operationId: adminDeleteCannedResponse
      tags: [admin-tickets]
      summary: Delete a canned response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /admin/ticket-routing:
    get:
      operationId: adminListRoutingRules
      tags: [admin-tickets]
      summary: List ticket routing rules
      responses:
        "200":
          description: List of routing rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoutingRule"
    post:
      operationId: adminCreateRoutingRule
      tags: [admin-tickets]
      summary: Create a ticket routing rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutingRule"
      responses:
        "201":
          description: Routing rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRule"

  /admin/ticket-routing/{id}:
    put:
      operationId: adminUpdateRoutingRule
      tags: [admin-tickets]
      summary: Update a ticket routing rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutingRule"
      responses:
        "200":
          description: Routing rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRule"
    delete:
      operationId: adminDeleteRoutingRule
      tags: [admin-tickets]
      summary: Delete a ticket routing rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /community/categories:
    get:
      operationId: listCommunityCategories
      tags: [community-categories]
      summary: List active community categories with post counts
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityCategory"

  /community/posts:
    get:
      operationId: listCommunityPosts
      tags: [community-posts]
      summary: Paginated community feed with category filter
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: categoryId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated post feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPostFeed"
    post:
      operationId: createCommunityPost
      tags: [community-posts]
      summary: Create a new community post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityPost"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPostRaw"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI chat assistant (SSE streaming response)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatMessageBody"
      responses:
        "200":
          description: SSE stream of chat response chunks
          content:
            text/event-stream:
              schema:
                type: string
        "403":
          description: No chat access
        "429":
          description: Daily limit reached

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [chat]
      summary: List chat sessions for the current user
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list of chat sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionList"

  /community/posts/{postId}:
    patch:
      operationId: editCommunityPost
      tags: [community-posts]
      summary: Edit a post within 15 minutes of creation
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditCommunityPost"
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPostRaw"
    delete:
      operationId: deleteCommunityPost
      tags: [community-posts]
      summary: Soft delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /chat/sessions/{sessionId}:
    get:
      operationId: getChatSession
      tags: [chat]
      summary: Get a chat session with full message history
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat session with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionWithMessages"
        "404":
          description: Not found
    delete:
      operationId: deleteChatSession
      tags: [chat]
      summary: Soft-delete a chat session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /community/posts/{postId}/comments:
    get:
      operationId: listCommunityComments
      tags: [community-comments]
      summary: List comments for a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityCommentItem"
    post:
      operationId: createCommunityComment
      tags: [community-comments]
      summary: Create a comment on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommunityComment"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCommentRaw"

  /community/comments/{commentId}:
    patch:
      operationId: editCommunityComment
      tags: [community-comments]
      summary: Edit a comment within 5 minutes of creation
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditCommunityComment"
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityCommentRaw"
    delete:
      operationId: deleteCommunityComment
      tags: [community-comments]
      summary: Soft delete a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comment deleted
          content:
            application/json:
              schema:
