          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppInstance"
        "400":
          description: Invalid app name or no domain on record
        "404":
          description: App instance not found
        "502":
          description: Squidy lookup or delete API error

security:
  - cookieAuth: []
  - apiKeyAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: JWT access token set via cookie after login
    apiKeyAuth:
      type: http
      scheme: bearer
      description: API key for programmatic access — pass as Bearer token (keys start with `bts_`)

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Number of items per page

  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Maximum requests allowed in the window
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Requests remaining in the current window
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp when the rate limit window resets

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Machine-readable error code
        requestId:
          type: string
          description: Request ID for debugging
      required: [error]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [name, email, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        onboardingComplete:
          type: boolean
        onboardingStep:
          type: integer
      required: [id, name, email, role]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    CommunicationRecord:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        subject:
          type: string
        status:
          type: string
        sentAt:
          type: string
          format: date-time
      required: [id, type, subject, status, sentAt]

    CommissionsDashboard:
      type: object
      properties:
        totalEarnings:
          type: number
        pendingEarnings:
          type: number
        approvedEarnings:
          type: number
        paidEarnings:
          type: number
        totalReferrals:
          type: integer
        activeReferrals:
          type: integer
        conversionRate:
          type: number

    CommissionsEarningsList:
      type: object
      properties:
        earnings:
          type: array
          items:
            $ref: "#/components/schemas/CommissionEarning"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [earnings, pagination]

    CommissionEarning:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        status:
          type: string
          enum: [pending, approved, paid, rejected, reversed]
        referralName:
          type: string
        productName:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, amount, status, createdAt]

    ReferralLink:
      type: object
      properties:
        id:
          type: integer
        productSlug:
          type: string
        productName:
          type: string
        referralCode:
          type: string
        url:
          type: string
        clickCount:
          type: integer
        conversionCount:
          type: integer
      required: [id, productSlug, productName, referralCode, url]

    CommissionPayout:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        status:
          type: string
          enum: [pending, processing, paid, failed]
        payoutMethod:
          type: string
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: ["string", "null"]
          format: date-time
      required: [id, amount, status, createdAt]

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        affiliateName:
          type: string
        totalEarnings:
          type: number
        referralCount:
          type: integer
      required: [rank, affiliateName, totalEarnings, referralCount]

    CommissionRate:
      type: object
      properties:
        id:
          type: integer
        productSlug:
          type: string
        rateType:
          type: string
          enum: [percentage, flat]
        rateValue:
          type: number
        isActive:
          type: boolean
      required: [id, productSlug, rateType, rateValue, isActive]

    CreateCommissionRate:
      type: object
      properties:
        productSlug:
          type: string
        rateType:
          type: string
          enum: [percentage, flat]
        rateValue:
          type: number
        isActive:
          type: boolean
      required: [productSlug, rateType, rateValue]

    AffiliateResource:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
        url:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, type, url, createdAt]

    CreateAffiliateResource:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
        url:
